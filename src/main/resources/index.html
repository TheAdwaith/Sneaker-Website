<!DOCTYPE html>
<html>
<head>
    <title>Sneaker Store</title>
    <style>
        body { font-family: Arial; text-align: center; }
        .card {
            border: 1px solid #ddd;
            padding: 15px;
            margin: 15px;
            display: inline-block;
            width: 200px;
        }
        img { width: 100%; }
    </style>
</head>
<body>

<h1>🔥 Sneaker Store</h1>
<div id="sneakerList"></div>

<script>
fetch("http://localhost:8080/api/sneakers")
.then(res => res.json())
.then(data => {
    const container = document.getElementById("sneakerList");
    data.forEach(sneaker => {
        container.innerHTML += `
            <div class="card">
                <img src="${sneaker.imageUrl}" />
                <h3>${sneaker.name}</h3>
                <p>${sneaker.brand}</p>
                <p>₹${sneaker.price}</p>
            </div>
        `;
    });
});
</script>

</body>
</html>
